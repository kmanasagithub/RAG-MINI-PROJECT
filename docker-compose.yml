version: "3.8"

services:

  MariaDB:
    image: mariadb:latest
    container_name: rag-mariadb

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: rag

    ports:
      - "3307:3306"

    volumes:
      - mariadb_data:/var/lib/mysql


volumes:
  mariadb_data: